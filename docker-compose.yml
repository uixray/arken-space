services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: arken
      POSTGRES_USER: arken
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arken}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arken -d arken"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      NODE_ENV: production
      APP_VERSION: ${APP_VERSION:-0.2.0}
      BUILD_REVISION: ${BUILD_REVISION:-unknown}
      SCHEMA_VERSION: 2
      PORT: 4100
      WEB_ORIGIN: ${WEB_ORIGIN:-https://arken.uixray.tech}
      PUBLIC_URL: ${PUBLIC_URL:-https://arken.uixray.tech}
      DATABASE_URL: postgres://arken:${POSTGRES_PASSWORD:-arken}@postgres:5432/arken
      SESSION_COOKIE_NAME: arken_session
      SESSION_TTL_DAYS: 30
      GM_ACCESS_TOKEN: ${GM_ACCESS_TOKEN:?Set GM_ACCESS_TOKEN in .env}
      MEDIA_ROOT: /srv/arken-space/media
      MEDIA_QUOTA_BYTES: ${MEDIA_QUOTA_BYTES:-5368709120}
      MIN_FREE_DISK_BYTES: ${MIN_FREE_DISK_BYTES:-5368709120}
    volumes:
      - ${MEDIA_HOST_PATH:-./media}:/srv/arken-space/media
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:4100:4100"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:4100/healthz').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "127.0.0.1:4180:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
